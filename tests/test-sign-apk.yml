name: Test sign Android APK with all inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java for keytool
        run: |
          java -version || (apt-get update && apt-get install -y default-jdk)

      - name: Generate test keystore and dummy APK
        id: setup
        run: |
          # Create release directory
          mkdir -p /tmp/release

          # Generate a test keystore
          keytool -genkeypair \
            -keystore /tmp/test.keystore \
            -alias testkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass testStorePass \
            -keypass testKeyPass \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US" \
            -noprompt

          # Encode keystore to base64
          KEYSTORE_BASE64=$(base64 -w 0 /tmp/test.keystore)
          echo "keystore_base64=$KEYSTORE_BASE64" >> $GITHUB_OUTPUT

          # Create a minimal dummy APK (zip file with AndroidManifest.xml placeholder)
          mkdir -p /tmp/apk_contents
          echo "dummy" > /tmp/apk_contents/dummy.txt
          cd /tmp/apk_contents && zip -r /tmp/release/app-release-unsigned.apk . > /dev/null
          echo "APK created at /tmp/release/app-release-unsigned.apk"
          ls -la /tmp/release/

      - id: action
        uses: .
        with:
          releaseDirectory: /tmp/release
          signingKeyBase64: ${{ steps.setup.outputs.keystore_base64 }}
          alias: testkey
          keyStorePassword: testStorePass
          keyPassword: testKeyPass

      - name: Assert signedReleaseFile output is set
        env:
          ACTUAL: ${{ steps.action.outputs.signedReleaseFile }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: signedReleaseFile output is empty"
            exit 1
          fi
          echo "PASS: signedReleaseFile=$ACTUAL"

      - name: Assert signed file exists
        env:
          SIGNED_FILE: ${{ steps.action.outputs.signedReleaseFile }}
        run: |
          echo "Checking signed file: $SIGNED_FILE"
          if [ ! -f "$SIGNED_FILE" ]; then
            echo "FAIL: signed file does not exist at $SIGNED_FILE"
            exit 1
          fi
          echo "PASS: signed file exists"
