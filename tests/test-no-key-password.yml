name: Test sign AAB without keyPassword
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create release directory with dummy AAB
        run: |
          mkdir -p /tmp/release-nopw
          # Create a minimal ZIP file (AAB is a ZIP-based format, jarsigner can sign it)
          echo "dummy aab content no-pw" > /tmp/dummy2.txt
          zip /tmp/release-nopw/app-release.aab /tmp/dummy2.txt

      - name: Generate test keystore without separate key password
        id: keystore
        run: |
          # When keyPassword is not set, jarsigner uses storepass for the key too
          keytool -genkeypair \
            -keystore /tmp/test-nopw.jks \
            -alias testkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -storepass storepass123 \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US" \
            -storetype JKS 2>/dev/null
          KEYSTORE_B64=$(base64 -w 0 /tmp/test-nopw.jks)
          echo "keystore_b64=$KEYSTORE_B64" >> $GITHUB_OUTPUT

      - id: action
        uses: .
        with:
          releaseDirectory: /tmp/release-nopw
          signingKeyBase64: ${{ steps.keystore.outputs.keystore_b64 }}
          alias: testkey
          keyStorePassword: storepass123

      - name: Assert signedReleaseFile output is set
        env:
          ACTUAL: ${{ steps.action.outputs.signedReleaseFile }}
        run: |
          echo "signedReleaseFile: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: signedReleaseFile output is empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert signed file exists on disk
        env:
          SIGNED_FILE: ${{ steps.action.outputs.signedReleaseFile }}
        run: |
          echo "Checking signed file: $SIGNED_FILE"
          if [ ! -f "$SIGNED_FILE" ]; then
            echo "FAIL: signed file does not exist at $SIGNED_FILE"
            exit 1
          fi
          echo "PASS"
